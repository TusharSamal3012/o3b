# Sharded variant of hc3d_frame_object.
#
# On first use the items are materialised once into
#   <path_preprocess>/sharded/<sharded_name>
# and loaded from there on subsequent runs (HuggingFace save_to_disk / load_from_disk).
# Set sharded_override: true to rebuild the shards even if they already exist.
#
# o3b dataset viz -d hc3d_frame_object_pair_cat_sharded

defaults:
  - hc3d_frame_object_pair
  - _self_


category: "facial_cream"
categories:
  - ${category}
sharded_name: hc3d_frame_object_pair_${category}
sharded_override: true
# overrides the (already-lowered) default from hc3d_frame_object_pair.yaml;
# kept explicit here since this is the config that actually triggers the build
sharded_shard_size: 10
 #