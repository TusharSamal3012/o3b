# Frame-object *pairs*: each item is an ObjectPair of two FrameObjects
# (query=src, target=trgt) of the same category, built on-the-fly from frames.db.
#
# Build the frame index first (shared with hc3d_frame_object):
#   o3b dataset index -d hc3d_frame_object
#
# Browse pairs in viser:
#   o3b dataset viz   -d hc3d_frame_object_pair
#   o3b dataset viz   -d hc3d_frame_object_pair --object-centric

defaults:
  - hc3d
  - _self_

class_name: HouseCorr3D

mesh_type: "mc16"

item_type: frame_object_pair

# split: "train" | "test" | "all"
split: all

# filter_is_real: null → all data  |  false → synthetic only  |  true → real only
filter_is_real: false

modalities:
  - rgb
  - fo_mask
  #- depth
  #- depth_mask
  - cam_intr4x4
  - cam_tform4x4_obj
  - cam_tform4x4_obj_ncds
  - cam_bbox2d
  - cam_bbox3d
  - obj_kpts3d
  - obj_kpts3d_mask
  - obj_kpts2d_mask
  - category

filter_has_kpts: true
filter_count_max: 50


transform:
  class_name: CropCamBBox2D
  H: 224 # 256
  W: 224 # 256
  # per-side crop margin as a fraction of bbox size (crop spans 1 + 2*bbox_overlap)
  bbox_overlap: 0.15

categories:
