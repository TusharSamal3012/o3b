# Frame-object *pairs*: each item is an ObjectPair of two FrameObjects
# (query=src, target=trgt) of the same category, built on-the-fly from frames.db.
#
# Build the frame index first (shared with hc3d_frame_object):
#   o3b dataset index -d hc3d_frame_object
#
# Browse pairs in viser:
#   o3b dataset viz   -d hc3d_frame_object_pair
#   o3b dataset viz   -d hc3d_frame_object_pair --object-centric

defaults:
  - hc3d_frame_object
  - _self_

item_type: frame_object_pair

# Modalities needed by CamCrsp3DNNTask + GenPose2Method + the crop transform.
# (overrides the hc3d_frame_object list, which lacks cam_tform4x4_obj_ncds).
modalities:
  - rgb                    # GenPose2 input
  - depth                  # GenPose2 input
  - depth_mask             # GenPose2 input
  - fo_mask                # GenPose2 input (object instance mask)
  - cam_intr4x4            # crop transform + GenPose2
  - cam_tform4x4_obj       # GT pose
  - cam_tform4x4_obj_ncds  # task: maps obj_kpts3d (NCDS) → camera space
  - cam_bbox2d             # required by the CropCamBBox2D transform
  - cam_bbox3d             # obj-space 3D box side lengths (drawn in qualit)
  - obj_kpts3d
  - obj_kpts3d_mask
  - obj_kpts2d_mask         # occlusion-aware visibility (amodal = annotated but not visible)
  - obj_syms                # per-axis symmetry code (see CamCrsp3DNNTask keypoint symmetry eval)
  - category

# viewpoints (frames) sampled per object instance when forming cross-instance
# pairs (1 = a single representative frame per instance, -1 = all available frames)
frame_pair_views_per_instance: 5 # per instance pair

filter_count_max: 1000 # per category if categories is applied

# how the two instances' viewpoints combine:
#   aligned → view i of A with view i of B   (~n_views pairs per instance pair)
#   cross   → every view of A with every view of B  (~n_views^2)
frame_pair_view_mode: aligned

