# o3b dataset fetch -d hc3d_frame_object
# o3b dataset index -d hc3d_frame_object --remove
# o3b dataset index -d hc3d_frame_object --remote -p slurm_lmbl40
# (filter_count_max stops indexing after this many filter-matching rows; also limits viz)

# o3b dataset viz   -d hc3d_frame_object

defaults:
  - hc3d
  - _self_

class_name: HouseCorr3D

mesh_type: "mc16"

# mesh_type: "mc16_vuni4_r256_fdinov2s"

item_type: frame_object

# split: "train" | "test" | "all"
split: test

# filter_is_real: null → all data  |  false → synthetic only  |  true → real only
filter_is_real: false

modalities:
  - rgb
  - fo_mask
  #- depth
  #- depth_mask
  - cam_intr4x4
  - cam_tform4x4_obj
  - cam_bbox2d
  - cam_bbox3d
  - obj_kpts3d
  - obj_bbox3d
  - obj_kpts3d_mask
  - obj_kpts2d_mask
  - obj_syms
  - category

filter_has_kpts: true
filter_count_max: 100 # per category if categories is applied


transform:
  class_name: CropCamBBox2D
  H: 256 # 256
  W: 256 # 256
  # per-side crop margin as a fraction of bbox size (crop spans 1 + 2*bbox_overlap)
  bbox_overlap: 0.15
  crop_type: "crop_large_side" # "crop_large_side" | "crop_small_side" | "crop_resize_ratio"

categories:
  - backpack
  - book
  - bottle
  - box
  - bread
  - coconut
  - conch
  - corn
  - dinosaur
  - dish
  - doll
  - egg
  - eraser
  - facial_cream
  - flower_pot
  - glasses_case
  - hair_dryer
  - hamburger
  - handbag
  - hand_cream
  - knife
  - lemon
  - light
  - lotus_root
  - mango
  - mangosteen
  - medicine_bottle
  - mouse
  - mug
  - orange
  - pillow
  - pomegranate
  - power_strip
  - remote_control
  - sausage
  - shampoo
  - shoe
  - shrimp
