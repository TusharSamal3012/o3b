# Extended OpenTTGames — table tennis event dataset
#
# o3x dataset fetch -d opentt
# o3x dataset index -d opentt
# o3x dataset viz   -d opentt
#
# On a remote platform:
# o3x dataset fetch -d opentt -p slurm
# o3x dataset index -d opentt -p slurm
# o3x dataset viz   -d opentt -p slurm

# o3x dataset preprocess -d opentt
# o3x dataset preprocess -d opentt --model Qwen/Qwen2-VL-2B-Instruct --device cuda:0
# o3x dataset preprocess -d opentt --model Qwen/Qwen3.5-4B --device cuda:0
# o3x dataset preprocess -d opentt --model Qwen/Qwen3.5-2B --device cuda:0
# o3x dataset preprocess -d opentt --model Qwen/Qwen3.5-0.8B --device cuda:0
# o3x dataset preprocess -d opentt --model Qwen/Qwen3.5-0.8B --device cuda:0
# o3x dataset preprocess -d opentt --model Qwen/Qwen3-VL-2B-Instruct --device cuda:0
# o3x dataset preprocess -d opentt --model Qwen/Qwen3-VL-2B-Instruct --device cuda:0

# Qwen/Qwen3-VL-2B-Instruct
class_name: OpenTT

path_datasets_raw:        /data/lmbraid19/sommerl/datasets
path_datasets_preprocess: /data/lmbraid19/sommerl/datasets

path_raw:        ${path_datasets_raw}/OpenTT
path_preprocess: ${path_datasets_preprocess}/OpenTT_Preprocess

split: train   # train | test | all

scene_length: 16   # number of frames per returned Scene clip

filter_count_max: 1

extra:
  frame_stride: 4    # step between consecutive frames within a clip (120fps / 4 = 30 effective fps)
  clip_stride: 64    # step between clip start frames; default = scene_length * frame_stride
